client_id = "YOUR_CLIENT_ID"
name = "Announcement App"
handle = "announcement-app"
# UPDATE THIS: Set to your Render URL (e.g. https://shopify-app-xyz.onrender.com)
application_url = "https://YOUR-APP-NAME.onrender.com"
embedded = true

[build]
path = "frontend/dist"

[web.backend]
command = "npm run dev"
cwd = "backend"

[web.frontend]
command = "npm run dev"
cwd = "frontend"

[access_scopes]
scopes = "write_products,read_metafields,write_metafields"

[auth]
redirect_urls = [
  # UPDATE THIS: Must match your Render URL + /api/auth/callback
  "https://YOUR-APP-NAME.onrender.com/api/auth/callback"
]
